<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Oferta Académica UNAJ - 2026</title>
    <link rel="stylesheet" href="styles.css" />

    <link
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="titulo-unaj">
          <h1>
            <img src="logo-unaj.svg" alt="Logotipo UNAJ" class="logo-svg" />
          </h1>
          <span class="sr-only">Oferta Académica UNAJ - 2026</span>

          <span>Los horarios y aulas pueden estar sujetos a modificación.</span>
        </div>
        <input
          id="search"
          type="search"
          class="search-box"
          placeholder=" Buscar materia o código..."
        />
        <div class="tabs-dropdown">
          <button id="dropdown-trigger" class="btn btn-trigger">
            <span id="selected-tab-text">Informática</span>
            <i class="fas fa-chevron-down"></i>
          </button>
          <div id="tabs-menu" class="tabs-menu">
            <button
              id="btn-info"
              class="btn btn-primary"
              onclick="handleTabClick('info', 'Informática')"
            >
              Informática
            </button>
            <button
              id="btn-basic"
              class="btn"
              onclick="handleTabClick('basic', 'Básicas')"
            >
              Básicas
            </button>
            <button
              id="btn-iniciales"
              class="btn"
              onclick="handleTabClick('iniciales', 'Iniciales')"
            >
              Iniciales
            </button>
          </div>
        </div>
      </div>
      <div id="lista-materias" class="list-container"></div>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div>
          <span
            id="materia-seleccionada"
            style="font-weight: bold; font-size: 1.1rem"
          >
            Seleccioná una materia
          </span>
        </div>
        <div style="display: flex; gap: 10px">
          <button id="toggleCalendarView" class="btn">
            <i class="fas fa-calendar-alt"></i> Mostrar planificador
          </button>

          <button id="refresh" class="btn">
            <i class="fas fa-sync-alt"></i> Refrescar
          </button>
        </div>
      </div>

      <div class="content-area">
        <div id="plannerPanel" style="display: none; margin-bottom: 30px">
          <div
            style="
              display: flex;
              justify-content: space-between;
              align-items: center;
              margin-bottom: 15px;
            "
          >
            <button
              id="clearCalendar"
              class="btn"
              style="background: #da3633; color: white; border: none"
            >
              <i class="fas fa-trash-alt"></i> Borrar Todo
            </button>

            <button
              id="downloadPDF"
              class="btn"
              style="background: #2da44e; color: white; border: none"
            >
              <i class="fas fa-file-pdf"></i> Descargar PDF
            </button>
          </div>
          <div id="planner">
            <table
              class="planner-table"
              style="width: 100%; border-collapse: collapse"
            >
              <thead>
                <tr>
                  <th style="width: 80px">Hora</th>
                  <th>Lunes</th>
                  <th>Martes</th>
                  <th>Miércoles</th>
                  <th>Jueves</th>
                  <th>Viernes</th>
                  <th>Sábado</th>
                </tr>
              </thead>
              <tbody id="planner-body"></tbody>
            </table>
          </div>
        </div>

        <div id="comisionesResult">
          <div class="no-selection">
            <h2 style="font-size: 4rem">🏫</h2>
            <p>
              Seleccioná una materia para ver profesores, edad y comisiones.
            </p>
          </div>
        </div>
      </div>
    </main>

    <script>
    

      (function initUIHelpers() {
      
        if (!document.querySelector(".toast-container")) {
          const tc = document.createElement("div");
          tc.className = "toast-container";
          document.body.appendChild(tc);
        }
        window.showToast = function (type = "info", message = "", opts = {}) {
          const container = document.querySelector(".toast-container");
          if (!container) return;
          const toast = document.createElement("div");
          toast.className = `toast ${type}`;
          toast.innerHTML = `<div class="msg">${message}</div><button class="close" aria-label="Cerrar">&times;</button>`;
          container.appendChild(toast);

          const autoClose =
            typeof opts.duration === "number" ? opts.duration : 4200;
          const close = () => {
            toast.style.transition = "opacity .18s, transform .18s";
            toast.style.opacity = "0";
            toast.style.transform = "translateX(12px)";
            setTimeout(() => toast.remove(), 200);
          };

          toast.querySelector(".close").addEventListener("click", close);
          if (autoClose > 0) {
            setTimeout(close, autoClose);
          }
          return {
            close,
          };
        };

      
        if (!document.getElementById("modal-confirm-overlay")) {
          const ov = document.createElement("div");
          ov.id = "modal-confirm-overlay";
          ov.className = "modal-overlay";
          ov.innerHTML = `
      <div class="modal" role="dialog" aria-modal="true">
        <h3 id="modal-confirm-title">Confirmar</h3>
        <p id="modal-confirm-message">¿Estás seguro?</p>
        <div class="modal-actions">
          <button class="btn-modal cancel" id="modal-confirm-cancel">Cancelar</button>
          <button class="btn-modal confirm" id="modal-confirm-ok">Eliminar</button>
        </div>
      </div>
    `;
          document.body.appendChild(ov);
        }

        window.showConfirm = function (message = "¿Continuar? ", options = {}) {
          return new Promise((resolve) => {
            const ov = document.getElementById("modal-confirm-overlay");
            const titleEl = ov.querySelector("#modal-confirm-title");
            const msgEl = ov.querySelector("#modal-confirm-message");
            const okBtn = ov.querySelector("#modal-confirm-ok");
            const cancelBtn = ov.querySelector("#modal-confirm-cancel");

            titleEl.textContent = options.title || "Confirmar";
            msgEl.textContent = message;
            okBtn.textContent = options.okText || "Confirmar";
            cancelBtn.textContent = options.cancelText || "Cancelar";

            function cleanup(result) {
              ov.style.display = "none";
              okBtn.removeEventListener("click", okHandler);
              cancelBtn.removeEventListener("click", cancelHandler);
              ov.removeEventListener("click", overlayHandler);
              resolve(result);
            }

            function okHandler(e) {
              e.stopPropagation();
              cleanup(true);
            }
            function cancelHandler(e) {
              e.stopPropagation();
              cleanup(false);
            }
            function overlayHandler(e) {
            
              if (e.target === ov) cleanup(false);
            }

            okBtn.addEventListener("click", okHandler);
            cancelBtn.addEventListener("click", cancelHandler);
            ov.addEventListener("click", overlayHandler);

            ov.style.display = "flex";
           
            setTimeout(() => okBtn.focus(), 40);
          });
        };
      })();

    
      (() => {
      

        let infoSubjects = [],
          basicSubjects = [],
          inicialSubjects = [],
          currentTab = "info";

        const $search = document.getElementById("search");
        $search.addEventListener("input", () => {
        
          try {
            window.scrollTo({ top: 0, behavior: "smooth" });
          } catch (e) {
            window.scrollTo(0, 0);
          }

         
          const lista = document.getElementById("lista-materias");
          if (!lista) return;

        
          const tryScrollElementToTop = (el) => {
            if (!el) return false;
            try {
              if (typeof el.scrollTo === "function") {
                el.scrollTo({ top: 0, behavior: "smooth" });
              } else {
                el.scrollTop = 0;
              }
              return true;
            } catch (err) {
              try {
                el.scrollTop = 0;
                return true;
              } catch (e) {
                return false;
              }
            }
          };

         
          if (lista.scrollHeight > lista.clientHeight) {
            if (tryScrollElementToTop(lista)) return;
          }

        
          let parent = lista.parentElement;
          while (parent && parent !== document.body) {
            const style = getComputedStyle(parent);
            const overflowY = style.overflowY;
            if (overflowY === "auto" || overflowY === "scroll") {
              tryScrollElementToTop(parent);
              break;
            }
            parent = parent.parentElement;
          }

         
        });
        const $listaMaterias = document.getElementById("lista-materias");
        const $comisionesResult = document.getElementById("comisionesResult");
        const $nombreMateria = document.getElementById("materia-seleccionada");

        const valueOr = (v, fallback = "No disponible") => {
          if (v === null || v === undefined || String(v).trim() === "")
            return fallback;
          return v;
        };

        window.switchTab = (tab) => {
          currentTab = tab;

          document.getElementById("btn-info").className =
            tab === "info" ? "btn btn-primary" : "btn";

          document.getElementById("btn-basic").className =
            tab === "basic" ? "btn btn-primary" : "btn";

          document.getElementById("btn-iniciales").className =
            tab === "iniciales" ? "btn btn-primary" : "btn";

          renderSubjects();
        };

        async function fetchAllMaterias(carrerId) {
          let allItems = [];
          let offset = 0;
          const limit = 10;
          let hasMore = true;
          let failsafe = 0; 

          while (hasMore && failsafe < 30) {
            failsafe++;
            console.log(`[Frontend] Pidiendo carrera ${carrerId}, offset: ${offset}...`);
            
            const res = await fetch(`/api/materias/${carrerId}?offset=${offset}`);
            if (!res.ok) throw new Error(`Error HTTP: ${res.status}`);

            const data = await res.json();
            const items = Array.isArray(data) ? data : (data.items || []);

            console.log(`[Frontend] Carrera ${carrerId} offset ${offset} trajo: ${items.length} materias`);

            if (items.length === 0) {
              hasMore = false;
            } else {
           
              if (allItems.length > 0 && JSON.stringify(items[0]) === JSON.stringify(allItems[0])) {
                console.warn(`[ALERTA] El backend está ignorando el offset. Devolvió las mismas materias para el offset ${offset}. Revisa tu proxy.`);
                hasMore = false;
                break;
              }

              allItems = allItems.concat(items);
              offset += limit;
              
              if (items.length < limit) {
                hasMore = false; 
              }
            }
          }
          return allItems;
        }

        function calcularEdad(fechaNacimiento) {
          if (!fechaNacimiento) return "No disponible";
          const cumple = new Date(fechaNacimiento);
          if (isNaN(cumple.getTime())) return "No disponible";
          const hoy = new Date();
          let edad = hoy.getFullYear() - cumple.getFullYear();
          const m = hoy.getMonth() - cumple.getMonth();
          if (m < 0 || (m === 0 && hoy.getDate() < cumple.getDate())) {
            edad--;
          }
          return edad >= 0 ? `${edad} años` : "No disponible";
        }

        function emailValido(email) {
          if (!email) return "No disponible";
          email = email.trim();
          const autoMail = /^[dD]?\d+@unaj\.edu\.ar$/;
          if (autoMail.test(email)) {
            return "No disponible";
          }
          return email;
        }

        function pickCommissionName(com) {
          return (
            com.commissionName ||
            com.comisionName ||
            com.name ||
            com.comisionId ||
            "No disponible"
          );
        }

        function makeCommissionKey(com) {
          const cid =
            com.comisionId ||
            com.commissionId ||
            com.id ||
            com.comision ||
            null;
          if (cid) return String(cid).trim();
          const name = String(pickCommissionName(com)).replace(/\s+/g, "_");
          return `${com.subjectId || "s"}_${name}`;
        }

        function getPlannerEventKeysFromDOM() {
          const root = document.getElementById("planner-body");
          if (!root) return [];
          return Array.from(root.querySelectorAll(".planner-event"))
            .map((ev) => ev.dataset.key)
            .filter(Boolean);
        }

        function plannerHasAnyWithPrefix(prefix) {
          if (!prefix) return false;
          return getPlannerEventKeysFromDOM().some(
            (k) => !!k && k.startsWith(prefix),
          );
        }

        function updateButtonsForKey(key) {
          if (!key) return;
          const exists = plannerHasAnyWithPrefix(key);
          document
            .querySelectorAll(`#comisionesResult button[data-key]`)
            .forEach((btn) => {
              if (btn.dataset.key !== key) return;
              if (exists) {
                btn.textContent = "Eliminar del planificador";
                btn.classList.add("btn-danger");
              } else {
                btn.textContent = "Agregar al planificador";
                btn.classList.remove("btn-danger");
              }
            });
        }

        function normalizeTextForCheck(s) {
          if (!s) return "";
          return String(s)
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .toLowerCase();
        }

        function isVirtualAsincronicaDay(d) {
          if (!d) return false;
          const candidates = [
            d.dictadoType,
            d.type,
            d.mode,
            d.observations,
            d.description,
            d.turnDescription,
            d.daysOfWeekName,
          ];
          for (const c of candidates) {
            if (!c) continue;
            const n = normalizeTextForCheck(c);
            if (
              n.includes("virtual") &&
              (n.includes("asin") ||
                n.includes("asincron") ||
                n.includes("asincrona") ||
                n.includes("asincrónica"))
            ) {
              return true;
            }
          }
          return false;
        }

        function sanitizeForKey(s) {
          if (!s) return "t";
          return String(s)
            .toLowerCase()
            .replace(/\s+/g, "_")
            .replace(/[^a-z0-9_]/g, "")
            .substring(0, 80);         }
       
        function parseTimeToMinutes(ts) {
          if (!ts) return null;
          ts = String(ts).trim();
         
          let m = ts.match(/(\d{1,2}):(\d{2})(?::\d{2})?\s*(am|pm)?/i);
          if (!m) {
            m = ts.match(/^(\d{2})(\d{2})$/);
            if (!m) return null;
          }
          let hh = parseInt(m[1], 10);
          const mm = parseInt(m[2], 10);
          const ampm = m[3];
          if (ampm) {
            const a = ampm.toLowerCase();
            if (a === "pm" && hh < 12) hh += 12;
            if (a === "am" && hh === 12) hh = 0;
          }
          if (isNaN(hh) || isNaN(mm)) return null;
          return hh * 60 + mm;
        }

        function timesOverlap(aStart, aEnd, bStart, bEnd) {
          
          if (aStart == null || aEnd == null || bStart == null || bEnd == null)
            return false;
         
          return aStart < bEnd && bStart < aEnd;
        }

        function formatMinutesToHHMM(mins) {
          if (mins == null || isNaN(mins)) return "";
          const hh = Math.floor(mins / 60);
          const mm = mins % 60;
          return `${String(hh).padStart(2, "0")}:${String(mm).padStart(2, "0")}`;
        }
       
        function isDesktopDevice() {
          try {
            return (
              window.matchMedia &&
              window.matchMedia("(pointer: fine) and (min-width: 900px)")
                .matches
            );
          } catch (e) {
            return window.innerWidth >= 900;
          }
        }

       
        if (typeof getScrollParent !== "function") {
          function getScrollParent(node) {
            if (!node)
              return document.scrollingElement || document.documentElement;
            let parent = node.parentElement;
            while (parent && parent !== document.body) {
              const style = getComputedStyle(parent);
              const oy = style.overflowY || style.overflow || "";
              if (oy && /(auto|scroll|overlay)/.test(oy)) return parent;
              parent = parent.parentElement;
            }
            return document.scrollingElement || document.documentElement;
          }
        }

       
        function scrollSmart(targetOrId) {
          const target =
            typeof targetOrId === "string"
              ? document.getElementById(targetOrId)
              : targetOrId;
          if (!target) return;

          const header = document.querySelector(".sidebar-header");
          const headerHeight = header
            ? header.getBoundingClientRect().height
            : 0;

          if (!isDesktopDevice()) {
           
            try {
              
              if (
                target.id === "comisionesResult" &&
                typeof scrollToComisiones === "function"
              ) {
                scrollToComisiones();
                return;
              }
              if (
                (target.id === "plannerPanel" || target.id === "planner") &&
                typeof scrollToPlanner === "function"
              ) {
                scrollToPlanner();
                return;
              }
            } catch (e) {
              // si falla la delegación, caemos al fallback (window scroll)
            }

            // fallback móvil: calculo simple del rect y window.scrollTo
            const rect = target.getBoundingClientRect();
            const topAbsolute = window.scrollY + rect.top;
            const scrollTo = Math.max(0, topAbsolute - headerHeight - 12);
            try {
              window.scrollTo({ top: scrollTo, behavior: "smooth" });
            } catch (e) {
              window.scrollTo(0, scrollTo);
            }
            return;
          }

          // === Desktop behaviour: scroll dentro del contenedor scrollable (sidebar) ===
          const scrollParent = getScrollParent(target);
          if (
            !scrollParent ||
            scrollParent === document.scrollingElement ||
            scrollParent === document.documentElement
          ) {
            // si no hay contenedor, usamos window (por si acaso)
            const rect = target.getBoundingClientRect();
            const topAbsolute = window.scrollY + rect.top;
            const scrollTo = Math.max(0, topAbsolute - headerHeight - 12);
            try {
              window.scrollTo({ top: scrollTo, behavior: "smooth" });
            } catch (e) {
              window.scrollTo(0, scrollTo);
            }
            return;
          }

          // calculamos offset relativo al scrollParent
          let offset = 0;
          let el = target;
          while (el && el !== scrollParent) {
            offset += el.offsetTop || 0;
            el = el.offsetParent;
          }
          const targetScrollTop = Math.max(0, offset - headerHeight - 12);

          // scrollear el contenedor (compatibilidad con navegadores antiguos)
          try {
            scrollParent.scrollTo({ top: targetScrollTop, behavior: "smooth" });
          } catch (e) {
            scrollParent.scrollTop = targetScrollTop;
          }
        }
        function scrollToComisiones() {
          const target = document.getElementById("comisionesResult");
          if (!target) return;

          const header = document.querySelector(".sidebar-header");
          const headerHeight = header
            ? header.getBoundingClientRect().height
            : 0;

          const rect = target.getBoundingClientRect();
          const topAbsolute = window.scrollY + rect.top;

          // restamos headerHeight + un pequeño margen (12px)
          const scrollTo = Math.max(0, topAbsolute - headerHeight - 12);

          window.scrollTo({ top: scrollTo, behavior: "smooth" });
        }

          function loadPlannerState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            let events = [];
            try {
              events = JSON.parse(raw);
            } catch (e) {
              events = [];
            }

           
            try {
              const filtered = events.filter(
                (ev) => !(ev.meta && ev.meta.virtualAsin),
              );
              if (filtered.length !== events.length) {
                try {
                  localStorage.setItem(STORAGE_KEY, JSON.stringify(filtered));

              }
              events = filtered;
            } catch (e) {
             
            }

            
            const eventsByDay = [[], [], [], [], [], []];
            events.forEach((ev) => {
              const day = Number(ev.day);
              if (isNaN(day) || day < 0 || day > 5) return;
              eventsByDay[day].push(ev);
            });

          
            eventsByDay.forEach((dayEvents, dayIdx) => {
              if (!dayEvents || dayEvents.length === 0) return;
              dayEvents.sort((a, b) => {
                const am =
                  a.meta && a.meta.startMin != null
                    ? Number(a.meta.startMin)
                    : Infinity;
                const bm =
                  b.meta && b.meta.startMin != null
                    ? Number(b.meta.startMin)
                    : Infinity;
                return am - bm;

              const col = document.querySelector(

              dayEvents.forEach((ev) => {
                const div = document.createElement("div");
                div.className = "planner-event";
                if (ev.key) div.dataset.key = ev.key;
                div.dataset.title = ev.title;
                div.dataset.meta = ev.meta ? JSON.stringify(ev.meta) : null;

                div.style.background = "var(--bg-event, #f6f8fa)";
                div.style.cursor = "pointer";
                const infoText = ev.meta && ev.meta.info ? ev.meta.info : "";
                const label = ev.meta && ev.meta.virtualAsin ? "" : "";
                div.innerHTML = `<b>${ev.title}</b>${label}${infoText ? `<div class="ventana-calendar" style="font-size:0.85rem; color:var(--text-muted)">${infoText}</div>` : ""}`;
                div.addEventListener("click", async (e) => {
                  e.stopPropagation();
                  const key = div.dataset.key;
                  const ok = await showConfirm(`Eliminar "${ev.title}"?`, {
                    title: "Eliminar evento",
                    okText: "Eliminar",
                    cancelText: "Cancelar",
                  });
                  if (!ok) return;
                  if (key) {
                    window.removeEventFromPlanner(key);
                  } else {
                    div.remove();
                    savePlannerState();
                  }
                });
                list.appendChild(div);
              });
            });
            const keys = getPlannerEventKeysFromDOM();
            keys.forEach((k) => updateButtonsForKey(k));
          }

         
          window.addEventToPlanner = function ({
            title,
            dayIndex,
            meta = null,
          }) {
            const d = Number(dayIndex);
            const col = document.querySelector(
              `.planner-day-col[data-day="${d}"]`,
            );
            if (!col) {
              showToast(
                "error",
                "No se pudo ubicar el día en la grilla (día inválido).",
              );
              return;
            }

            const key = meta && meta.key ? String(meta.key) : null;

          
            if (
              key &&
              document.querySelector(
                `.planner-event[data-key="${CSS.escape(key)}"]`,
              )
            ) {
              showToast("warn", "Ya existe ese evento en el planificador.");
              return;
            }

           
            if (!(meta && meta.virtualAsin)) {
              if (meta && meta.startMin != null && meta.endMin != null) {
                const existingEvents = Array.from(
                  col.querySelectorAll(".planner-event"),
                );
                for (const ev of existingEvents) {
                  try {
                    const emeta = ev.dataset.meta
                      ? JSON.parse(ev.dataset.meta)
                      : null;

                    // ignorar eventos virtuales asincrónicos
                    if (!emeta || emeta.virtualAsin) continue;

                    const s =
                      emeta.startMin != null ? Number(emeta.startMin) : null;
                    const e =
                      emeta.endMin != null ? Number(emeta.endMin) : null;

                    if (s != null && e != null) {
                      if (timesOverlap(meta.startMin, meta.endMin, s, e)) {
                        const existingTitle =
                          ev.dataset.title || emeta.title || "Evento";

                        showToast(
                          "error",
                          `Conflicto: "${title}" (${formatMinutesToHHMM(meta.startMin)} - ${formatMinutesToHHMM(meta.endMin)}) se superpone con "${existingTitle}" (${formatMinutesToHHMM(s)} - ${formatMinutesToHHMM(e)}).`,
                        );
                        return;
                      }
                    }
                  } catch (err) {}
                }
              }
            }

          
            const list = col.querySelector(".planner-day-events");
            const div = document.createElement("div");
            div.className = "planner-event";
            if (key) div.dataset.key = key;

            div.dataset.meta = meta ? JSON.stringify(meta) : null;

            div.style.borderRadius = "6px";

            div.innerHTML = `<b>${title}</b>${label}${infoText ? `<div style="font-size:0.85rem; color:var(--text-muted)">${infoText}</div>` : ""}`;

            div.addEventListener("click", async (e) => {
              e.stopPropagation();
              const keyLocal = div.dataset.key;
              const ok = await showConfirm(`Eliminar "${title}"?`, {
                title: "Eliminar evento",
                okText: "Eliminar",
                cancelText: "Cancelar",
              });
              if (!ok) return;
              if (keyLocal) {
                window.removeEventFromPlanner(keyLocal);
              } else {
                div.remove();
                savePlannerState();
              }
            });

            // --- insertar ordenado por startMin (si existe) ---
            (function insertOrdered() {
              try {
                const newStart =
                  meta && meta.startMin != null ? Number(meta.startMin) : null;
                if (newStart == null) {
                  // si no tenemos hora de inicio del nuevo evento -> lo dejamos al final
                  list.appendChild(div);
                  return;
                }

                const children = Array.from(
                  list.querySelectorAll(".planner-event"),
                );
                let inserted = false;
                for (const child of children) {
                  try {
                    const cmeta = child.dataset.meta
                      ? JSON.parse(child.dataset.meta)
                      : null;
                    const cStart =
                      cmeta && cmeta.startMin != null
                        ? Number(cmeta.startMin)
                        : null;
                    // si el evento actual no tiene start (null) lo consideramos "infinito" (va al final)
                    if (cStart == null) {
                      // insertar antes del primer que no tenga hora (así los con hora quedan ordenados arriba)
                      list.insertBefore(div, child);
                      inserted = true;
                      break;
                    }
                    if (newStart < cStart) {
                      list.insertBefore(div, child);
                      inserted = true;
                      break;
                    }
                  } catch (e) {
                    // en caso de error de parseo, saltamos ese elemento
                  }
                }
                if (!inserted) {
                  list.appendChild(div);
                }
              } catch (err) {
                // fallback seguro: si algo falla, append normal
                list.appendChild(div);
              }
            })();

            savePlannerState();
          };

          // eliminar evento(s) por key
          window.removeEventFromPlanner = function (key) {
            if (!key) return;
            const baseKey = String(key).split("_d")[0];

            document.querySelectorAll(".planner-event").forEach((el) => {
              const k = el.dataset.key;
              if (!k) return;
              if (k === key || k.startsWith(baseKey + "_d")) {

            toggleBtn.addEventListener("click", () => {

          loadPlannerState();

        // actualiza una variable CSS con la altura del header para usar en CSS si necesitás
        function updateSidebarHeaderHeightVar() {

        // inicializar después DOM load
        document.addEventListener("DOMContentLoaded", () => {

            $search.addEventListener("input", () => {
              // re-renderizamos la lista
              renderSubjects();

              // esperamos un poco para que el DOM actualice y luego scrolleamos suavemente
              setTimeout(() => {
                const lista = document.getElementById("lista-materias");
                if (!lista) return;

                // Buscar el primer ancestro con overflow auto/scroll.
                function getScrollParent(node) {
                  if (!node) return null;
                  let parent = node.parentElement;
                  while (parent) {
                    const style = getComputedStyle(parent);
                    const overflowY = style.overflowY;
                    if (overflowY === "auto" || overflowY === "scroll")
                      return parent;
                    parent = parent.parentElement;
                  }
                  return document.scrollingElement || document.documentElement;
                }

                const scrollParent = getScrollParent(lista);

                // altura del header fijo (si existe)
                const header = document.querySelector(".sidebar-header");
                const headerHeight = header
                  ? header.getBoundingClientRect().height
                  : 0;

                if (
                  scrollParent &&
                  scrollParent !== document.scrollingElement &&
                  scrollParent !== document.documentElement
                ) {
                  // SCROLL DENTRO DEL SIDEBAR: calculamos offset relativo al scrollParent
                  const firstItem =
                    lista.querySelector(".materia-item") || lista;

                  // calcular offsetTop relativo al scrollParent (sumando offsetTop hasta llegar al scrollParent)
                  let offset = 0;
                  let el = firstItem;
                  while (el && el !== scrollParent) {
                    offset += el.offsetTop || 0;
                    el = el.offsetParent;
                  }

                  // compensar header height y un pequeño margen
                  const targetScrollTop = Math.max(
                    0,
                    offset - headerHeight - 8,
                  );

                  // scrollear el contenedor
                  scrollParent.scrollTo({
                    top: targetScrollTop,
                    behavior: "smooth",
                  });
                } else {
                  // SCROLL DE LA VENTANA: compensa header (comportamiento anterior)
                  const rect = lista.getBoundingClientRect();
                  const topAbsolute = window.scrollY + rect.top;
                  const scrollTo = Math.max(0, topAbsolute - headerHeight - 8);
                  window.scrollTo({ top: scrollTo, behavior: "smooth" });
                }
              }, 60);
            });
          }
          const refreshBtn = document.getElementById("refresh");
          if (refreshBtn) refreshBtn.addEventListener("click", loadSubjects);

      // Listener para descargar PDF: reemplazado para generar PDF desde datos (sin screenshot)
      // reemplazar el listener existente por este bloque mejorado
      const dlBtn = document.getElementById("downloadPDF");
      if (dlBtn) {
        dlBtn.addEventListener("click", () => {
          try {
            const STORAGE_KEY = "weeklyPlanner_v1_nocolumnas";
            const raw = localStorage.getItem(STORAGE_KEY);
            let events = [];
            try {
              events = raw ? JSON.parse(raw) : [];
            } catch (e) {
              events = [];
            }

            // Filtrar eventos virtuales (si existieran)
            events = events.filter((ev) => !(ev.meta && ev.meta.virtualAsin));

            if (!events || events.length === 0) {
              showToast(
                "info",
                "No hay eventos en el planificador para exportar.",
              );
              return;
            }

            // Agrupar por día (0 = Lunes ... 5 = Sábado)
            const daysNames = [
              "Lunes",
              "Martes",
              "Miércoles",
              "Jueves",
              "Viernes",
              "Sábado",
            ];
            const eventsByDay = [[], [], [], [], [], []];

            events.forEach((ev) => {
              const day = Number(ev.day);
              if (isNaN(day) || day < 0 || day > 5) return;
              const info =
                ev.meta && ev.meta.info ? String(ev.meta.info).trim() : "";
              const title = ev.title ? String(ev.title).trim() : "";
              const cellText = info ? `${title}\n${info}` : title;
              eventsByDay[day].push(cellText);
            });

            const maxRows = Math.max(...eventsByDay.map((a) => a.length), 1);

            // Crear PDF con jsPDF (ya incluido)
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
              orientation: "landscape",
              unit: "pt",
              format: "a4",
            });

            const pageWidth = pdf.internal.pageSize.getWidth();
            const pageHeight = pdf.internal.pageSize.getHeight();
            const margin = 36;
            const usableWidth = pageWidth - margin * 2;
            const colCount = daysNames.length; // 6
            const colWidth = usableWidth / colCount;
            let y = margin;

            // Configuraciones de dibujo (bordes y texto)
            pdf.setDrawColor(180); // color de borde (gris claro)
            pdf.setLineWidth(0.7);

            // Título
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(16);
            pdf.text("Cronograma de Clases", pageWidth / 2, y, {
              align: "center",
            });
            y += 18;
            pdf.setFontSize(9);
            pdf.setFont("helvetica", "normal");
            pdf.text(
              `Generado: ${new Date().toLocaleString()}`,
              pageWidth / 2,
              y,
              {
                align: "center",
              },
            );
            y += 16;

            // Header días (fondo gris suave + borde)
            pdf.setFontSize(11);
            for (let c = 0; c < colCount; c++) {
              const x = margin + c * colWidth;
              // fondo header (gris muy suave)
              pdf.setFillColor(240, 240, 240);
              pdf.rect(x, y, colWidth, 22, "F");
              // borde header
              pdf.setDrawColor(180);
              pdf.rect(x, y, colWidth, 22);
              // texto centrado
              pdf.setTextColor(0, 0, 0);
              pdf.text(daysNames[c], x + colWidth / 2, y + 15, {
                align: "center",
              });
            }
            y += 22;

            // Filas con salto de página si hace falta
            for (let r = 0; r < maxRows; r++) {
              // calcular altura de fila en base al contenido (wrap)
              const cellSplits = [];
              let rowHeight = 18;
              for (let c = 0; c < colCount; c++) {
                const text = eventsByDay[c][r] || "";
                const split = pdf.splitTextToSize(text || "", colWidth - 8);
                const h = Math.max(12, split.length * 10 + 8);
                cellSplits.push({ split, h });
                if (h > rowHeight) rowHeight = h;
              }

              // salto de página si no entra
              if (y + rowHeight + margin > pageHeight) {
                pdf.addPage();
                y = margin;
              }

              // dibujar celdas (fondo blanco + borde) y texto
              for (let c = 0; c < colCount; c++) {
                const x = margin + c * colWidth;
                // fondo blanco para evitar manchas/solapamientos
                pdf.setFillColor(255, 255, 255);
                pdf.rect(x, y, colWidth, rowHeight, "F");
                // borde ligero
                pdf.setDrawColor(200);
                pdf.rect(x, y, colWidth, rowHeight);
                // texto (si hay)
                const { split } = cellSplits[c];
                pdf.setFontSize(10);
                pdf.setTextColor(0, 0, 0);
                if (split && split.length > 0) {
                  pdf.text(split, x + 6, y + 12);
                }
              }

              y += rowHeight;
            }

            pdf.save("mi_horario_unaj.pdf");
          } catch (err) {
            console.error("Error generando PDF desde datos:", err);
            // antes: alert("Ocurrió un error al generar el PDF. Revisá la consola.");
            showToast(
              "error",
              "Ocurrió un error al generar el PDF. Revisá la consola.",
            );
          }
        });
      }

          }
          snapshot.forEach((child) => {
            const v = child.val();
            const d = document.createElement("div");
            d.className = "comment";
            const when = v.date ? new Date(v.date).toLocaleString() : "";
            d.innerHTML = `<div style="font-size:0.8rem; color:var(--text-muted,#9aa4ad)">${when}</div><div style="margin-top:4px">${escapeHtml(v.text)}</div>`;
            list.appendChild(d);
          });
          // scrollear al final
          list.scrollTop = list.scrollHeight;
        });
      };

      // enviar comentario
      window.sendComment = async function () {
        const input = document.getElementById("commentsInput");
        const txt = String(input.value || "").trim();
        if (!txt) {
          window.showToast(
            "warn",
            "⚠️ Por favor, escribí un comentario antes de enviar.",
          );
          input.focus();
          return;
        }

        if (txt.length > 400) {
          window.showToast(
            "error",
            "❌ El comentario es muy largo (máximo 400 caracteres).",
          );
          return;
        }

        if (!_currentTeacherId) {
          window.showToast(
            "error",
            "Error crítico: No se reconoció el profesor.",
          );
          return;
        }

        const commentsRef = ref(db, `comments/${_currentTeacherId}`);
        await push(commentsRef, { text: txt, date: Date.now() });
        input.value = "";
      };

      window.closeComments = function () {
        document.getElementById("commentsModal").style.display = "none";
        // remover listener Firebase si estaba activo
        if (_currentCommentsRef) {
          try {
            off(_currentCommentsRef);
          } catch (e) {
            /* ignore */
          }
          _currentCommentsRef = null;
        }
        // opcional: limpiar lista si querés
        // document.getElementById("commentsList").innerHTML = "";
        _currentTeacherId = null;
      };

      // listeners UI
      document
        .getElementById("commentsSendBtn")
        .addEventListener("click", sendComment);
      document
        .getElementById("commentsCloseBtn")
        .addEventListener("click", closeComments);

      // helper para mostrar contenido seguro
      function escapeHtml(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      // función util para actualizar el texto del botón (por ejemplo "Comentarios (3)")
      window.updateCommentCountBadge = async function (teacherId, btnEl) {
        if (!teacherId || !btnEl) return;
        try {
          const commentsRef = ref(db, `comments/${teacherId}`);
          onValue(commentsRef, (snapshot) => {
            const n = snapshot.exists() ? snapshot.size : 0;
            btnEl.textContent = `Comentarios (${n})`;
          });
        } catch (e) {
          /* ignore */
        }
      };
      // 1. Manejar el click del trigger para abrir/cerrar
      document
        .getElementById("dropdown-trigger")
        .addEventListener("click", function (e) {
          e.stopPropagation();
          document.getElementById("tabs-menu").classList.toggle("show");
        });

      // 2. Cerrar el menú si hacen click afuera
      document.addEventListener("click", () => {
        document.getElementById("tabs-menu").classList.remove("show");
      });

      // 3. Nueva función puente para no romper tu switchTab original
      window.handleTabClick = function (tab, label) {
        // Actualizamos el texto del botón principal
        document.getElementById("selected-tab-text").innerText = label;

        // Llamamos a tu función original que ya maneja la lógica de datos
        window.switchTab(tab);

        // Cerramos el menú
        document.getElementById("tabs-menu").classList.remove("show");
      };
    </script>

    <div id="commentsModal" role="dialog" aria-modal="true">
      <div class="modal-card">
        <h3 id="commentsModalTitle">Comentarios</h3>
        <div id="commentsList">Cargando...</div>
        <textarea
          id="commentsInput"
          placeholder="Escribe tu comentario (máx 400 caracteres)"
        ></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" id="commentsCloseBtn">Cerrar</button>
          <button class="btn btn-primary" id="commentsSendBtn">Enviar</button>
        </div>
      </div>
    </div>
  </body>
</html>
